# =========================================
# GENERARISE.SPACE (Agentes)
# =========================================

server {
    listen 80;
    server_name www.generarise.space;
    return 301 http://generarise.space$request_uri;
}

server {
    listen 80 default_server;
    server_name generarise.space;
    
    root /code/agentes;
    index index.html index.htm;
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PROYECTO AUSTRIA (Puerto 3002)
    location /austria/ {
        proxy_pass http://localhost:3002/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # TEMPLATE SAAS (Puerto 3003)
    location /template/ {
        proxy_pass http://localhost:3003/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CARPETA DE BROCHURES (PÚBLICA)
    location /brochures/ {
        alias /var/www/generarise/brochures/;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

