<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenerArise — High-Performance AI Marketplace</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <meta name="description" content="Soluciones de IA de alto impacto. Automatización, Generación de Contenido y Prospección B2B avanzada con GenerArise.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #6366f1;
            --primary-glow: rgba(0, 210, 255, 0.2);
            --secondary: #8b5cf6;
            --accent: #10b981;
            --bg: #06060b;
            --bg-card: #11111d;
            --bg-card-hover: #16162a;
            --text: #f0f0f5;
            --text-dim: #8888a8;
            --border: rgba(255,255,255,0.08);
            --whatsapp: #25D366;
            --radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter', sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            overflow-x:hidden;
            line-height: 1.6;
        }
        body::before {
            content:'';position:fixed;inset:0;
            background:radial-gradient(ellipse at 20% 0%,rgba(0, 210, 255, 0.08),transparent 60%),
                        radial-gradient(ellipse at 80% 100%,rgba(139,92,246,0.06),transparent 60%);
            pointer-events:none;z-index:0;
        }

        /* HEADER */
        header {
            position:sticky;top:0;z-index:100;
            backdrop-filter:blur(20px);
            background:rgba(6,6,11,0.85);
            border-bottom:1px solid var(--border);
            padding:0.8rem 5%;
            display:flex;justify-content:space-between;align-items:center;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            height: 42px;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.5));
            animation: logo-float-3d 4s ease-in-out infinite;
        }
        @keyframes logo-float-3d {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-6px) rotateY(15deg); }
        }
        .logo-text {
            font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            letter-spacing: -1px;
        }
        
        .header-actions { display:flex;gap:1rem;align-items:center; }
        .cart-btn {
            position:relative; background:rgba(255,255,255,0.03); border:1px solid var(--border);
            border-radius:12px; padding:0.6rem 1rem; cursor:pointer;
            color:var(--text); font-size:0.9rem; transition:0.3s;
            display:flex;align-items:center;gap:10px;
        }
        .cart-btn:hover { border-color:var(--primary); background:rgba(255,255,255,0.06); }
        .cart-count {
            background:var(--primary); color:#000; font-size:0.7rem;
            font-weight:800; border-radius:50%; width:20px; height:20px;
            display:flex; align-items:center; justify-content:center;
            position:absolute; top:-8px; right:-8px;
            box-shadow: 0 0 15px var(--primary-glow);
            transform:scale(0); transition:0.3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .cart-count.show { transform:scale(1); }

        /* HERO */
        .hero {
            text-align:center;padding:4rem 5% 2rem;position:relative;z-index:1;
        }
        .hero-badge {
            display:inline-block;padding:8px 18px;border-radius:50px;
            background:rgba(0, 210, 255, 0.1);border:1px solid rgba(0, 210, 255, 0.2);
            font-size:0.75rem;font-weight:700;color:var(--primary);
            margin-bottom:1.2rem;letter-spacing:1.5px;text-transform:uppercase;
        }
        .hero h1 {
            font-family:'Space Grotesk',sans-serif;font-size:clamp(2.2rem,5vw,3.8rem);
            font-weight:700;letter-spacing:-1.5px;margin-bottom:1rem;
            line-height:1.1;
        }
        .hero h1 em {
            font-style:normal;
            background:linear-gradient(135deg,var(--primary),#fff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        }
        .hero p { color:var(--text-dim);font-size:1.1rem;max-width:600px;margin:0 auto; font-weight: 300; }

        /* GRID */
        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
            gap:2rem;padding:2rem 8% 5rem;position:relative;z-index:1;
        }

        /* PRODUCT CARD */
        .card {
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:var(--radius);overflow:hidden;
            transition:0.4s;
            position:relative;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform:translateY(-10px);border-color:var(--primary);
            box-shadow:0 20px 40px rgba(0,0,0,0.5);
        }
        .card-img {
            width:100%;height:220px;
            position:relative;overflow:hidden;
            background: #1a1a2e;
        }
        .card-img img {
            width:100%;height:100%;object-fit:cover;
            transition:0.6s;
            filter: brightness(0.8);
        }
        .card:hover .card-img img { transform:scale(1.05); filter: brightness(1); }
        
        .card-img .tag {
            position:absolute;top:15px;left:15px;
            padding:5px 12px;border-radius:8px;font-size:0.7rem;font-weight:700;
            background:rgba(6,6,11,0.8);backdrop-filter:blur(8px);
            color:var(--primary);border:1px solid var(--primary);
            text-transform:uppercase;letter-spacing:1px;
        }
        
        .card-body { padding:1.8rem; flex: 1; display: flex; flex-direction: column; }
        .card-body h3 { font-family: 'Space Grotesk', sans-serif; font-size:1.4rem; margin-bottom:0.8rem; font-weight:700; }
        .card-body .desc {
            color:var(--text-dim);font-size:0.9rem;
            line-height:1.6;margin-bottom:1.5rem;
            flex: 1;
        }
        .card-footer {
            display:flex;justify-content:space-between;align-items:center;
            padding-top: 1.2rem; border-top: 1px solid var(--border);
        }
        .price {
            font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;
            color: #fff;
        }
        .price small { font-size:0.75rem;color:var(--text-dim);font-weight:400; display: block; }
        
        .add-btn {
            background:linear-gradient(135deg, var(--primary), var(--secondary));
            color:#fff;border:none;
            padding:0.7rem 1.2rem;border-radius:10px;cursor:pointer;
            font-family:inherit;font-weight:700;font-size:0.85rem;
            display:flex;align-items:center;gap:6px;transition:0.3s;
        }
        .add-btn:hover { transform:scale(1.05); }
        .add-btn.added { background:var(--accent); }

        /* CART DRAWER */
        .cart-overlay {
            position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;
            opacity:0;pointer-events:none;transition:0.3s;
            backdrop-filter: blur(4px);
        }
        .cart-overlay.open { opacity:1;pointer-events:auto; }
        .cart-drawer {
            position:fixed;top:0;right:-450px;width:450px;max-width:100vw;height:100vh;
            background:var(--bg-card);border-left:1px solid var(--border);
            z-index:201;transition:0.4s cubic-bezier(0.4,0,0.2,1);
            display:flex;flex-direction:column;
        }
        .cart-drawer.open { right:0; }
        .cart-header {
            padding:1.5rem;border-bottom:1px solid var(--border);
            display:flex;justify-content:space-between;align-items:center;
        }
        .cart-close {
            background:none; border:none; color:var(--text-dim);
            font-size:1.5rem;cursor:pointer;
        }
        
        .cart-items { flex:1;overflow-y:auto;padding:1.5rem; }
        .cart-item {
            display:flex;gap:15px;padding:1rem 0;
            border-bottom:1px solid var(--border);
            align-items:center;
        }
        .cart-item img { width:60px;height:60px;border-radius:10px;object-fit:cover; }
        .cart-item-info { flex:1; }
        .cart-item-info h4 { font-size:1rem; margin-bottom:2px; }
        .cart-item-info .ci-price { font-size:0.9rem;color:var(--primary);font-weight:700; }
        
        .cart-footer {
            padding:2rem; border-top: 1px solid var(--border);
        }
        .cart-total {
            display:flex;justify-content:space-between;align-items:center;
            margin-bottom:1.5rem;
        }
        .cart-total strong { font-family:'Space Grotesk',sans-serif;font-size:1.6rem; color: #fff; }
        
        .checkout-btn {
            width:100%;padding:1.1rem;border:none;border-radius:12px;
            background:var(--whatsapp);color:#fff;font-family:inherit;
            font-size:1rem;font-weight:800;cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:10px;
            transition:0.3s;
        }
        .checkout-btn:hover { background:#1ebc5a; transform: translateY(-2px); }
        
        .cart-empty {
            text-align:center;padding:4rem 1rem;color:var(--text-dim);
        }
        .cart-empty i { font-size:3rem;margin-bottom:1rem;opacity:0.2; }

        footer {
            text-align:center;padding:3rem 5%;
            border-top:1px solid var(--border);
            color:var(--text-dim);font-size:0.8rem;
            position:relative;z-index:1;
        }
        footer a { color:var(--primary);text-decoration:none; }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="../assets/logo.png" alt="GenerArise" class="logo-icon">
        <div class="logo-text">GenerArise</div>
    </a>
    <div class="header-actions">
        <div class="cart-btn" onclick="toggleCart()" id="cartBtn">
            <i class="fas fa-shopping-bag"></i>
            <span>Mi Orden</span>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-badge">AI Excellence & Performance</div>
    <h1>Domine su mercado con <em>GenerArise</em></h1>
    <p>Sistemas de Inteligencia Artificial diseñados para escalar facturación, automatizar contenido y cazar prospectos 24/7.</p>
</section>

<div class="grid" id="productGrid">
    <!-- Cargado por JS -->
</div>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
        <h2 style="font-family:'Space Grotesk'; font-size:1.3rem;">Configuración de Orden</h2>
        <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
        <div class="cart-total">
            <span>Inversión Total</span>
            <strong id="cartTotal">$0</strong>
        </div>
        <button class="checkout-btn" onclick="checkout()">
            <i class="fab fa-whatsapp"></i> Finalizar por WhatsApp
        </button>
    </div>
</div>

<footer>
    <p>© 2026 GenerArise AI — <a href="index.html">Volver a la Home</a></p>
</footer>

<script>
const PRODUCTS = [
    { 
        id: 'ga_os_core', 
        name: 'GenerArise OS Core', 
        category: 'Sistemas', 
        price: 500000, 
        tag: 'Full Implementation', 
        desc: 'La solución definitiva. Implementación completa de Content Factory, Leads Sniper y Automatización de Ventas en su infraestructura propia.', 
        img: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800'
    },
    { 
        id: 'ga_cf_pro', 
        name: 'Content Factory Pro', 
        category: 'Contenido', 
        price: 150000, 
        tag: 'Monthly SaaS', 
        desc: 'Generación autónoma de video para redes sociales. Guionizado, edición y publicación automática para dominar el algoritmo.', 
        img: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?w=800'
    },
    { 
        id: 'ga_vis_ai', 
        name: 'Visual AI Avatar', 
        category: 'Visual', 
        price: 250000, 
        tag: 'One-Time Setup', 
        desc: 'Creación de su avatar digital con voz clonada y lip-sync perfecto. Produzca contenido sin estar físicamente presente.', 
        img: 'https://images.unsplash.com/photo-1675271591211-126ad94e495d?w=800'
    },
    { 
        id: 'ga_leads_sniper', 
        name: 'B2B Leads Sniper', 
        category: 'Ventas', 
        price: 350000, 
        tag: 'Success Fee Option', 
        desc: 'Extracción de prospectos de alto ticket y primer contacto inteligente. Reemplazamos bots básicos por IA de grado industrial.', 
        img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800'
    }
];

let cart = [];

function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = PRODUCTS.map((p, idx) => {
        const inCart = cart.find(c => c.id === p.id);
        return `
        <div class="card" style="animation: fadeUp 0.6s ease both ${idx * 0.1}s">
            <div class="card-img">
                <img src="${p.img}" alt="${p.name}">
                <div class="tag">${p.tag}</div>
            </div>
            <div class="card-body">
                <h3>${p.name}</h3>
                <p class="desc">${p.desc}</p>
                <div class="card-footer">
                    <div class="price"><small>ARS</small>$${p.price.toLocaleString('es-AR')}</div>
                    <button class="add-btn ${inCart ? 'added' : ''}" onclick="addToCart('${p.id}')">
                        <i class="fas ${inCart ? 'fa-check' : 'fa-plus'}"></i>
                        ${inCart ? 'Agregado' : 'Añadir'}
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderCart() {
    const itemsEl = document.getElementById('cartItems');
    const countEl = document.getElementById('cartCount');
    const totalEl = document.getElementById('cartTotal');
    
    const total = cart.reduce((s, i) => s + i.price, 0);
    const count = cart.length;

    countEl.textContent = count;
    countEl.classList.toggle('show', count > 0);
    totalEl.textContent = '$' + total.toLocaleString('es-AR');

    if (!cart.length) {
        itemsEl.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-bag"></i><p>Sin servicios seleccionados</p></div>';
        return;
    }
    itemsEl.innerHTML = cart.map(i => `
        <div class="cart-item">
            <img src="${i.img}" alt="${i.name}">
            <div class="cart-item-info">
                <h4>${i.name}</h4>
                <div class="ci-price">$${i.price.toLocaleString('es-AR')}</div>
            </div>
            <i class="fas fa-trash-alt" style="cursor:pointer; opacity:0.5" onclick="removeFromCart('${i.id}')"></i>
        </div>
    `).join('');
}

function addToCart(id) {
    if (cart.find(c => c.id === id)) return toggleCart();
    const p = PRODUCTS.find(x => x.id === id);
    if(p) cart.push(p);
    renderCart();
    renderProducts();
    toggleCart();
}

function removeFromCart(id) {
    cart = cart.filter(c => c.id !== id);
    renderCart();
    renderProducts();
}

function toggleCart() {
    document.getElementById('cartOverlay').classList.toggle('open');
    document.getElementById('cartDrawer').classList.toggle('open');
}

function checkout() {
    if (!cart.length) return;
    const itemsList = cart.map(i => `• ${i.name} — $${i.price.toLocaleString('es-AR')}`);
    const total = cart.reduce((s, i) => s + i.price, 0);
    const msg = `🚀 *SOLICITUD DE SISTEMA — GenerArise*\n\nHola! Deseo implementar los siguientes sistemas en mi negocio:\n\n${itemsList.join('\n')}\n\n💰 *Total Inversión: $${total.toLocaleString('es-AR')} ARS*\n\nPor favor, confirmame disponibilidad para el setup inicial.`;
    const phone = '5491178287901';
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

window.onload = renderProducts;
</script>
</body>
</html>
