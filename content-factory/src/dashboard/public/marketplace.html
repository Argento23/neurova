<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>GenerArise — Lead Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #030307;
      --bg2: #08081a;
      --bg3: #0f0f2a;
      --glass: rgba(10, 10, 30, 0.65);
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --cyan: #22d3ee;
      --emerald: #34d399;
      --violet: #a78bfa;
      --rose: #fb7185;
      --amber: #fbbf24;
      --blue: #60a5fa;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ── Animated BG (From Index) ── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(34,211,238,0.08), transparent),
        radial-gradient(ellipse 500px 500px at 80% 60%, rgba(167,139,250,0.08), transparent),
        radial-gradient(ellipse 400px 300px at 50% 90%, rgba(52,211,153,0.06), transparent);
      animation: glowShift 20s ease-in-out infinite alternate;
    }
    @keyframes glowShift {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(30deg); }
    }
    
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 40px; border-bottom: 1px solid var(--border);
      background: rgba(3,3,7,0.7); backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white;}
    .brand span { background: linear-gradient(135deg, var(--cyan), var(--emerald)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; object-fit: contain; }
    
    .nav-actions { display: flex; gap: 16px; align-items: center; }
    .btn-login { background: transparent; color: var(--text); border: 1px solid var(--border2); padding: 8px 18px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; text-decoration: none; transition: all 0.2s;}
    .btn-login:hover { background: rgba(255,255,255,0.05); border-color: var(--cyan); color: var(--cyan); }
    
    .hero { text-align: center; padding: 80px 24px 60px; position: relative; z-index: 1; }
    .hero h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 900; letter-spacing: -1.5px; margin-bottom: 12px; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--muted); font-size: 16px; max-width: 600px; margin: 0 auto; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; display: grid; grid-template-columns: 300px 1fr; gap: 40px; position: relative; z-index: 1;}
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    
    /* Filters Sidebar */
    .sidebar { position: sticky; top: 100px; height: fit-content; }
    .filters { 
      background: var(--glass); border: 1px solid var(--border2); border-radius: 24px; padding: 28px; 
      backdrop-filter: blur(16px); box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .filters h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--cyan); margin-bottom: 24px; font-weight: 800; }
    .form-group { margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    
    select, input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: white; font-family: inherit; font-size: 14px; outline: none;
      transition: all 0.2s;
    }
    /* FIX: Ensure dropdown options are visible in all browsers */
    select option {
      background-color: var(--bg3);
      color: white;
    }
    select:focus, input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(34,211,238,0.1); }
    
    .btn-filter { 
      width: 100%; padding: 14px; border-radius: 12px; 
      background: linear-gradient(135deg, var(--cyan), var(--emerald)); color: #000; 
      border: none; font-weight: 700; cursor: pointer; transition: all 0.3s; 
    }
    .btn-filter:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,211,238,0.3); }
    
    /* Listings */
    .listings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .listings-count { font-size: 14px; color: var(--muted); font-weight: 500; }
    
    .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
    
    .lead-card {
      background: var(--glass); border: 1px solid var(--border2); border-radius: 24px; padding: 32px;
      backdrop-filter: blur(16px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
    }
    .lead-card:hover { transform: translateY(-8px); border-color: rgba(34,211,238,0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .lead-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--emerald)); opacity: 0.5;
    }
    
    .lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .lead-industry { font-size: 11px; font-weight: 800; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; background: rgba(34,211,238,0.1); padding: 6px 12px; border-radius: 100px; border: 1px solid rgba(34,211,238,0.2); }
    .lead-score { font-size: 15px; font-weight: 800; color: var(--amber); display: flex; align-items: center; gap: 6px; }
    
    .lead-desc { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; color: var(--text); }
    
    .lead-features { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
    .feature { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.03); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); }
    .feature.has { color: var(--emerald); border-color: rgba(52,211,153,0.2); background: rgba(52,211,153,0.05); }
    
    .lead-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; }
    .lead-price { font-size: 28px; font-weight: 900; color: #fff; }
    .btn-buy { background: linear-gradient(135deg, var(--cyan), var(--emerald)); color: #000; border: none; padding: 10px 24px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 0.3s; }
    .btn-buy:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(34,211,238,0.3); }
    
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 32px; padding: 48px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
    .modal h2 { margin-bottom: 16px; font-size: 28px; font-weight: 800; }
    .modal p { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
    .btn-cancel { background: transparent; color: var(--muted); border: none; font-size: 14px; cursor: pointer; font-weight: 500; }
    .btn-cancel:hover { color: white; }

    /* Loading state */
    .loading-pulse { animation: pulse 1.5s infinite; color: var(--muted); text-align: center; padding: 40px; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <nav class="navbar">
    <a href="/index.html" class="brand">
      <img src="/logo.png" alt="Logo"> 
      <span>GenerArise</span>
    </a>
    <div class="nav-actions" id="authSection">
      <a href="/auth.html" class="btn-login">Ingresar</a>
    </div>
  </nav>
  
  <div class="hero">
    <h1>Leads Calificados B2B</h1>
    <p>Comprá contactos listos para vender. Con teléfono, email y calificación de IA. Desbloqueo instantáneo.</p>
  </div>
  
  <div class="container">
    <div class="sidebar">
      <div class="filters">
        <h3>Filtros</h3>
        <div class="form-group">
          <label>Industria</label>
          <select id="filterIndustry">
            <option value="">Todas las industrias</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ciudad</label>
          <input type="text" id="filterCity" placeholder="Ej: Madrid">
        </div>
        <div class="form-group">
          <label>Calidad Mínima (Score)</label>
          <select id="filterScore">
            <option value="0">Todos los niveles</option>
            <option value="70">🔥 Calientes (>70)</option>
            <option value="85">🚀 Top Tier (>85)</option>
          </select>
        </div>
        <button class="btn-filter" onclick="loadListings()">Aplicar Filtros</button>
      </div>
    </div>
    
    <div class="main">
      <div class="listings-header">
        <h2 style="font-size: 22px; font-weight: 800;">Leads Disponibles</h2>
        <div class="listings-count" id="listingsCount">Calculando...</div>
      </div>
      
      <div class="listings-grid" id="listingsGrid">
        <!-- Rendered via JS -->
      </div>
    </div>
  </div>
  
  <!-- Purchase Modal -->
  <div class="modal-overlay" id="purchaseModal">
    <div class="modal">
      <h2>Desbloquear Lead</h2>
      <p>Acceso inmediato a los datos de contacto directos de este lead verificado.</p>
      <div style="font-size: 40px; font-weight: 900; margin-bottom: 32px; color: var(--cyan);" id="modalPrice">$25</div>
      
      <div id="paypal-button-container"></div>
      <button class="btn-cancel" onclick="closeModal()" style="margin-top:20px;">Cancelar transacción</button>
    </div>
  </div>

  <script>
    let supabaseClient = null;
    let currentUser = null;
    let selectedListingId = null;
    let selectedPrice = null;
    let paypalLoaded = false;
    
    async function init() {
      try {
        const res = await fetch('/api/public-config');
        if (res.ok) {
          const config = await res.json();
          supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
          const { data } = await supabaseClient.auth.getSession();
          if (data.session) {
            currentUser = data.session.user;
            document.getElementById('authSection').innerHTML = `
              <span style="font-size:13px;color:var(--muted);margin-right:8px;">${currentUser.email}</span>
              <a href="/app.html" class="btn-login" style="border-color:var(--cyan);color:var(--cyan)">Mi Panel</a>
            `;
          }
          
          if (config.paypalClientId && !paypalLoaded) {
            loadPayPalScript(config.paypalClientId);
          }
        }
      } catch (e) { console.error('Auth check failed'); }
      
      await loadIndustries();
      await loadListings();
    }
    
    function loadPayPalScript(clientId) {
      const script = document.createElement('script');
      script.src = `https://www.paypal.com/sdk/js?client-id=${clientId}&currency=USD`;
      script.onload = () => { paypalLoaded = true; };
      document.head.appendChild(script);
    }
    
    async function loadIndustries() {
      try {
        const res = await fetch('/api/marketplace/industries');
        const industries = await res.json();
        const select = document.getElementById('filterIndustry');
        industries.forEach(ind => {
          if(!ind) return;
          const opt = document.createElement('option');
          opt.value = ind; opt.textContent = ind;
          select.appendChild(opt);
        });
      } catch (e) {}
    }
    
    async function loadListings() {
      const grid = document.getElementById('listingsGrid');
      grid.innerHTML = '<div class="loading-pulse">Cargando mejores leads...</div>';
      
      const industry = document.getElementById('filterIndustry').value;
      const city = document.getElementById('filterCity').value;
      const minScore = document.getElementById('filterScore').value;
      
      let url = '/api/marketplace/listings?';
      if (industry) url += `industry=${encodeURIComponent(industry)}&`;
      if (city) url += `city=${encodeURIComponent(city)}&`;
      if (minScore > 0) url += `min_score=${minScore}&`;
      
      try {
        const res = await fetch(url);
        const leads = await res.json();
        
        document.getElementById('listingsCount').textContent = `${leads.length} leads encontrados`;
        
        if (leads.length === 0) {
          grid.innerHTML = '<p style="color:var(--muted);text-align:center;grid-column:1/-1;padding:60px;">No hay leads que coincidan con tu búsqueda en este momento.</p>';
          return;
        }
        
        grid.innerHTML = leads.map(l => `
          <div class="lead-card">
            <div class="lead-header">
              <span class="lead-industry">${l.industry || 'Business'}</span>
              <span class="lead-score">⭐ ${l.ai_score}/100</span>
            </div>
            <div class="lead-desc">${l.description}</div>
            
            <div class="lead-features">
              <div class="feature ${l.has_phone ? 'has' : ''}">📱 Teléfono</div>
              <div class="feature ${l.has_email ? 'has' : ''}">✉️ Email</div>
              <div class="feature ${l.has_website ? 'has' : ''}">🌐 Web</div>
            </div>
            
            <div class="lead-footer">
              <div class="lead-price">$${l.price_usd}</div>
              <button class="btn-buy" onclick="openModal('${l.id}', '${l.price_usd}')">Comprar</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<p style="color:var(--rose);text-align:center;padding:40px;">Error al conectar con el servidor.</p>';
      }
    }
    
    function openModal(id, price) {
      if (!currentUser) {
        window.location.href = '/auth.html';
        return;
      }
      selectedListingId = id;
      selectedPrice = price;
      document.getElementById('modalPrice').textContent = `$${price} USD`;
      document.getElementById('purchaseModal').style.display = 'flex';
      
      document.getElementById('paypal-button-container').innerHTML = '';
      
      if (paypalLoaded) {
        renderPayPalButtons();
      } else {
        document.getElementById('paypal-button-container').innerHTML = '<p style="color:var(--amber)">Cargando plataforma de pago...</p>';
      }
    }
    
    function renderPayPalButtons() {
      paypal.Buttons({
        style: { layout: 'vertical', color: 'blue', shape: 'rect', label: 'pay' },
        createOrder: function(data, actions) {
          return actions.order.create({
            purchase_units: [{
              description: `Lead Unlock - ID: ${selectedListingId}`,
              amount: { value: selectedPrice, currency_code: 'USD' }
            }]
          });
        },
        onApprove: async function(data, actions) {
          const order = await actions.order.capture();
          if (order.status === 'COMPLETED') {
            alert('¡Pago completado! El lead ha sido desbloqueado. En tu panel podrás ver los datos.');
            closeModal();
            loadListings();
          }
        },
        onError: function(err) {
          console.error(err);
          alert('Hubo un problema al procesar el pago.');
        }
      }).render('#paypal-button-container');
    }
    
    function closeModal() {
      document.getElementById('purchaseModal').style.display = 'none';
      selectedListingId = null;
      selectedPrice = null;
    }
    
    init();
  </script>
</body>
</html>
